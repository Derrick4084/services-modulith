# ===============================
# Application
# ===============================
server.port=8080
spring.application.name=EcommApp

spring.profiles.active=prod

# ===============================
# AWS Secrets Manager (Postgres)
# ===============================
spring.config.import=aws-secretsmanager:${POSTGRES_DB_SECRET_NAME}

## ===============================
## Kafka (MSK IAM Auth)
## ===============================
#spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false


# ===============================
# PostgreSQL Datasource
# ===============================
spring.datasource.url=jdbc:postgresql://${host}/ecomm?sslmode=verify-full&sslrootcert=/app/certs/rds-combined-ca-bundle.pem
spring.datasource.username=${username}
spring.datasource.password=${password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# PostgreSQL Datasource
# ===============================
#spring.datasource.url=jdbc:postgresql://localhost:5432/ecomm
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# ===============================
# Flyway
# ===============================
#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-description=init
#spring.flyway.baseline-version=0
#spring.flyway.user=${username}
#spring.flyway.password=${password}

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description=init
spring.flyway.baseline-version=0
spring.flyway.user=postgres
spring.flyway.password=postgres


