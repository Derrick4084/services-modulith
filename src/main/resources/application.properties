# ===============================
# Application
# ===============================
server.port=8080
spring.application.name=EcommApp

spring.profiles.active=prod

# ===============================
# AWS Secrets Manager (Postgres)
# ===============================
spring.config.import=\
aws-secretsmanager:${POSTGRES_DB_SECRET_NAME}?prefix=postgres.,\
aws-secretsmanager:${DOCUMENTDB_SECRET_NAME}?prefix=documentdb.,\
aws-secretsmanager:${MAILDEV_SECRET_NAME}

# ==========================================
# AWS Configuration
# ==========================================
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.use-default-aws-credentials-chain=true

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false


# ===============================
# PostgreSQL Datasource
# ===============================
spring.datasource.url=jdbc:postgresql://${postgres.host}/ecomm?sslmode=verify-full&sslrootcert=/app/certs/rds-combined-ca-bundle.pem
spring.datasource.username=${postgres.username}
spring.datasource.password=${postgres.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# PostgreSQL Datasource
# ===============================
#spring.datasource.url=jdbc:postgresql://localhost:5432/ecomm
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# ===============================
# Flyway
# ===============================
#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-description=init
#spring.flyway.baseline-version=0
#spring.flyway.user=${username}
#spring.flyway.password=${password}

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description=init
spring.flyway.baseline-version=0
spring.flyway.user=postgres
spring.flyway.password=postgres


