# ===============================
# AWS Secrets Manager (Postgres)
# ===============================
spring.config.import=\
aws-secretsmanager:${POSTGRES_DB_SECRET_NAME}?prefix=postgres.,\
aws-secretsmanager:${DOCUMENTDB_SECRET_NAME}?prefix=documentdb.

# ==========================================
# AWS Configuration
# ==========================================
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.use-default-aws-credentials-chain=true

# =================================
# PostgreSQL Datasource AWS
# ==================================
spring.datasource.url=jdbc:postgresql://${postgres.host}/ecomm?sslmode=verify-full&sslrootcert=/app/certs/rds-combined-ca-bundle.pem
spring.datasource.username=${postgres.username}
spring.datasource.password=${postgres.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Flyway AWS
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description=init
spring.flyway.baseline-version=0
spring.flyway.user=${postgres.username}
spring.flyway.password=${postgres.password}

# ==========================================
# Java Mail Properties Development Only
# ==========================================
dev.mail.port=1025
dev.mail.host=smtp-mail-svc
dev.mail.username=mailuser
dev.mail.password=mailpassword