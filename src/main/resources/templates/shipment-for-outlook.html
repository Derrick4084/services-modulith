<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shipment Confirmation</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:Arial, sans-serif;">

<!-- Wrapper -->

<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f4f4f7;">
    <tr>
        <td align="center" style="padding:20px 10px;">


            <!-- Container -->
            <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color:#ffffff;">

                <!-- Header -->
                <tr>
                    <td align="center" style="background-color:#064b97; color:#ffffff; padding:16px; font-size:20px; font-weight:bold;">
                        Shipment Confirmation
                    </td>
                </tr>

                <!-- Content -->
                <tr>
                    <td style="padding:20px; color:#333333; font-size:14px; line-height:1.6;">

                        <p style="margin:0 0 10px;">
                            Dear <strong th:text="${customerName}"></strong>,
                        </p>

                        <p style="margin:0 0 15px;">
                            Your order
                            <strong th:text="${orderReference}"></strong>
                            has been shipped.
                        </p>

                        <!-- Shipment Details Table -->
                        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse; margin-top:15px;">

                            <tr>
                                <td style="padding:10px; border:1px solid #dddddd; font-weight:bold; width:40%;">
                                    Carrier
                                </td>
                                <td style="padding:10px; border:1px solid #dddddd;"
                                    th:text="${carrier}">
                                </td>
                            </tr>

                            <tr>
                                <td style="padding:10px; border:1px solid #dddddd; font-weight:bold;">
                                    Tracking Number
                                </td>
                                <td style="padding:10px; border:1px solid #dddddd;"
                                    th:text="${trackingNumber}">
                                </td>
                            </tr>

                            <tr>
                                <td style="padding:10px; border:1px solid #dddddd; font-weight:bold;">
                                    Estimated Delivery
                                </td>
                                <td style="padding:10px; border:1px solid #dddddd;"
                                    th:text="${estimatedDeliveryDate}">
                                </td>
                            </tr>

                        </table>

                        <!-- CTA Button -->
                        <table border="0" cellspacing="0" cellpadding="0" style="margin:20px 0;">
                            <tr>
                                <td align="center">

                                    <!--[if mso]>
                                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
                                                 xmlns:w="urn:schemas-microsoft-com:office:word"
                                                 href="#"
                                                 style="height:40px;v-text-anchor:middle;width:220px;"
                                                 arcsize="10%"
                                                 strokecolor="#df4a77"
                                                 fillcolor="#df4a77">
                                        <w:anchorlock/>
                                        <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;">
                                            Track Shipment
                                        </center>
                                    </v:roundrect>
                                    <![endif]-->

                                    <!--[if !mso]><!-- -->
                                    <a href="#"
                                       style="display:inline-block; padding:12px 20px; font-size:14px; font-weight:bold; color:#ffffff; background-color:#064b97; text-decoration:none;">
                                        Track Shipment
                                    </a>
                                    <!--<![endif]-->

                                </td>
                            </tr>
                        </table>

                        <p style="margin:20px 0 0;">
                            Thank you for choosing <strong>DeroCode</strong>.
                        </p>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center" style="background-color:#f8f8f8; padding:20px; font-size:12px; color:#888888;">

                        <p style="margin:5px 0;">
                            This is an automated message. Please do not reply.
                        </p>

                        <p style="margin:5px 0;">
                            <a href="#" style="color:#064b97; text-decoration:none;">Website</a> |
                            <a href="#" style="color:#064b97; text-decoration:none;">Support</a> |
                            <a href="#" style="color:#064b97; text-decoration:none;">Contact</a>
                        </p>

                        <p style="margin:5px 0;">
                            &copy; 2026 DeroCode. All rights reserved.
                        </p>

                    </td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>
